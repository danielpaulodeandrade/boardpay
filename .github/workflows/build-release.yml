name: Build & Release BoardPay.exe

# Dispara quando você criar uma tag do tipo v1.0, v2.1, etc.
on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Portable EXE (Windows)
    runs-on: windows-latest

    steps:
      # 1. Baixa o código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Configura Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # 4. Instala dependências do backend
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller pillow

      # 5. Instala dependências do frontend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # 6. Executa o script de build completo
      - name: Build portable EXE
        run: python scripts/build_portable.py

      # 7. Publica o .exe como GitHub Release
      - name: Create GitHub Release with EXE
        uses: softprops/action-gh-release@v2
        with:
          name: "BoardPay ${{ github.ref_name }}"
          body: |
            ## 🎲 BoardPay ${{ github.ref_name }} — Portable Release

            ### Como usar
            1. Baixe o `BoardPay.exe` abaixo.
            2. Execute-o com duplo clique em qualquer notebook Windows.
            3. Acesse **http://localhost:5000** no navegador.
            4. Conecte os celulares via hotspot no mesmo IP mostrado no terminal.

            > **Nota:** O banco de dados (`instance/boardpay.db`) é criado na mesma pasta do .exe. Guarde essa pasta para manter seu histórico de partidas.
          files: dist/BoardPay.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
